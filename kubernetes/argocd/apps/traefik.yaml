apiVersion: argoproj.io/v1aplha1
kind: Application
metadata: 
  name: traefik
  namespace: argocd
spec:
  source:
    repoURL: https://helm.traefik.io/traefik
    targetRevision: 30.0.0
    helm:
      valueFiles:
        - helm/traefik/values.yaml
  
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true