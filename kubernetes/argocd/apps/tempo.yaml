apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  source:
    chart: tempo
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 2.0.0
    
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true