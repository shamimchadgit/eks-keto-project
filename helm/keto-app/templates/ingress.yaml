apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keto-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules: # Defining routing 
    - host: {{ index .Values.ingress.hosts 0 }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.path }}
            pathType: Prefix
            backend:
              service:
                name: keto-service
                port: 
                  number: {{ .Values.service.port }}
tls:
  - hosts:
      - {{ index .Values.ingress.hosts 0 }}
    secretName: keto-tls

# Now if request comes from eks.shamimchaudhury.uk it sends traffic to keto-service (my backend) 
