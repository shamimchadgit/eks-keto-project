apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keto-ingress
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules: # Defining routing 
    - host: {{ .Values.ingress.hosts.host }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.path }}
            pathType: Prefix
            backend:
              service:
                name: keto-service
                port: 
                  number: {{ .Values.service.port }}

# Now if request comes from eks.shamimchaudhury.uk it sends traffic to keto-service (my backend) 
